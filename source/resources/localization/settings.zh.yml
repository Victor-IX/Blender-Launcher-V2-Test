general:
  label: 常规
  app:
    label: 应用程序
    library_folder: "库文件夹:"

    language: 语言
    language_auto: 自动
    language_tooltip: |
      选择Blender Launcher的显示语言。
      "自动"会自动检测您的系统语言。
      需要重启才能生效。
      DEFAULT: Auto

    system_start: 系统启动时启动
    system_start_tooltip: |
      系统启动时启动应用程序。
      DEFAULT: Off
    launch_minimized: 启动时最小化到托盘
    launch_minimized_tooltip: |
      启动时最小化到系统托盘。
      DEFAULT: Off
    minimize: 最小化到托盘
    minimize_tooltip: |
      关闭应用程序时会将其最小化到系统托盘，而不是完全关闭
      DEFAULT: Off
    worker_count: 工作线程数
    worker_count_tooltip: |
      决定可以同时进行的IO操作数量，例如：下载、删除、解压
      DEFAULT: <cpu count> * (3/4)
    worker_count_warning: "(警告: 数值超过 %{cnt} (cpu count) !!)"
    prerelease: 使用预发布版本
    prerelease_tooltip: |
      检查Blender Launcher新版本时，同时检查预发布版本。
      警告: 这些版本可能存在漏洞！主要用于测试新功能。
      DEFAULT: Off

    create_shortcut: 创建Blender Launcher %{shortcut_type}
    shortcut_type:
      windows: 快捷方式
      linux: 桌面文件
      macos: 快捷方式
  migratel2u: 将本地设置迁移到用户设置

  file_assoc:
    label: 文件关联

    register: 注册文件关联
    register_tooltip: |
      将Blender Launcher添加到可打开.blend文件的程序列表中

    unregister: 取消注册文件关联
    unregister_tooltip: |
      将Blender Launcher从可打开.blend文件的程序列表中移除

    launch_timer_duration: 启动计时器时长 (秒)
    launch_timer_duration_tooltip: |
      决定打开blend文件时有多少时间可以更改要启动的构建版本
      DEFAULT: 3s
    launch_timer_suffix:
      "-1": " (已禁用)"
      "0": "秒 (立即)"
      more: "秒"

  winget:
    label: WinGet 集成

    info: 向WinGet包管理器注册Blender Launcher，以便通过'winget update'实现自动更新。
    register: 向WinGet注册
    register_tooltip: |
      向WinGet注册此安装，以便可以通过'winget update'进行更新
    unregister: 从WinGet取消注册
    unregister_tooltip: |
      移除此安装的WinGet注册

  advanced:
    label: 高级

    delete_actions:
      "0": 移至回收站
      "1": 永久删除
    default_delete_action: 默认删除操作
    default_delete_action_tooltip: |
      设置右键菜单中删除构建版本的默认操作
      按住Shift键时可使用另一选项
      DEFAULT: Send to Trash

    purge_temp: 启动时清理临时文件夹
    purge_temp_tooltip: |
      Blender Launcher启动时自动清空临时下载文件夹。
      DEFAULT: On

    purge_temp_now: 立即清理临时文件夹
    purge_temp_now_tooltip: |
        立即清空临时下载文件夹中的所有文件




  pr_custom_names:
    title: PRカスタム名
    fetch_during_scrape: スクレイピング中にPR名を取得
    fetch_during_scrape_tooltip: |
      PR名はprojects.blender.org/blender/blender/pulls/から取得されます。
      デフォルト: 無効
    prepend_pr_number: カスタム名にPR番号を付加する
    prepend_pr_number_tooltip: |
      取得されたPRビルドの先頭に、その番号が表示されるようになります。
      "Label" -> "xxxxx: Label"
      デフォルト: 有効

  launching_builds: ビルドの起動
  on_blender_launch_action: Blender起動時の動作
  on_blender_launch_action_tooltip: |
    Blenderのインスタンスが起動されたときにBlender Launcherウィンドウに対して行う動作。
    デフォルト: 何もしない
  on_blender_launch_actions:
    "0": 何もしない
    "1": 最小化
    "2": 閉じる
  quick_launch_global_shortcut: クイック起動グローバルショートカット
  quick_launch_global_shortcut_tooltip: |
    Blenderを素早く起動するためのグローバルショートカットを有効にします
    デフォルト: 有効
  quick_launch_key_seq_tooltip: |
    Blenderを素早く起動するためのグローバルショートカット
    デフォルト: ctrl + f11
  hide_console_on_startup: 起動時にコンソールを非表示
  hide_console_on_startup_tooltip: |
    Blender起動時にコンソールウィンドウを非表示にします
    デフォルト: 有効
  blender_startup_arguments_tooltip: |
    Blender起動時に渡す引数（Blender実行ファイルの後 例: [… <args>]）
    デフォルト: None
    例: --background
  bash_arguments_tooltip: |
    Blender起動時にbashに渡す命令（Blender実行ファイルの前 例: [<args> …]）
    デフォルト: None
    例: env __NV_PRIME_RENDER_OFFLOAD=1 __GLX_VENDOR_LIBRARY_NAME=nvidia nohup
  bash_arguments: "Bash引数:"
  startup_arguments: "起動引数:"




general:
  label: 全般
  app:
    label: アプリケーション
    library_folder: "ライブラリフォルダ:"

    language: 言語
    language_auto: 自動
    language_tooltip: |
      Blender Launcherの表示言語を選択します。
      「自動」はシステム言語を自動検出します。
      反映するには再起動が必要です。
      デフォルト: Auto

    system_start: システム起動時に起動
    system_start_tooltip: |
      システム起動時にアプリを自動的に開始します。
      デフォルト: 無効
    launch_minimized: トレイに最小化して起動
    launch_minimized_tooltip: |
      システムトレイに最小化した状態でアプリを起動します。
      デフォルト: 無効
    minimize: トレイに最小化
    minimize_tooltip: |
      アプリを閉じると完全に終了せず、システムトレイに最小化します
      デフォルト: 無効
    worker_count: ワーカースレッド数
    worker_count_tooltip: |
      同時に実行できるIO操作の数を設定します（例: ダウンロード、削除、展開）
      デフォルト: <CPUコア数> * (3/4)
    worker_count_warning: "(警告: %{cnt} (CPUコア数) を超えています！！)"
    prerelease: プレリリース版を使用
    prerelease_tooltip: |
      Blender Launcherの新バージョンを確認する際に、プレリリース版もチェックします。
      警告: これらのビルドにはバグが含まれている可能性があります！主に新機能のテスト用です。
      デフォルト: 無効

    create_shortcut: Blender Launcherの%{shortcut_type}を作成
    shortcut_type:
      windows: ショートカット
      linux: デスクトップファイル
      macos: ショートカット
  migratel2u: ローカル設定をユーザー設定に移行

  file_assoc:
    label: ファイルの関連付け

    register: ファイルの関連付けを登録
    register_tooltip: |
      .blendファイルを開けるプログラムのリストにBlender Launcherを追加します

    unregister: ファイルの関連付けを解除
    unregister_tooltip: |
      .blendファイルを開けるプログラムのリストからBlender Launcherを削除します

    launch_timer_duration: 起動タイマー (秒)
    launch_timer_duration_tooltip: |
      blendファイルを開く際に起動するビルドを変更できる時間を設定します
      デフォルト: 3s
    launch_timer_suffix:
      "-1": " (無効)"
      "0": "秒 (即時)"
      more: "秒"

  winget:
    label: WinGet連携

    info: WinGetパッケージマネージャにBlender Launcherを登録して、'winget update'による自動更新を有効にします。
    register: WinGetに登録
    register_tooltip: |
      このインストールをWinGetに登録して、'winget update'で更新できるようにします
    unregister: WinGetから登録解除
    unregister_tooltip: |
      このインストールのWinGet登録を削除します

  advanced:
    label: 詳細設定

    delete_actions:
      "0": ゴミ箱に移動
      "1": 完全に削除
    default_delete_action: デフォルトの削除操作
    default_delete_action_tooltip: |
      右クリックメニューでビルドを削除する際のデフォルト操作を設定します
      Shiftキーを押しながらでもう一方のオプションを使用できます
      デフォルト: ゴミ箱に移動

    purge_temp: 起動時に一時フォルダを空にする
    purge_temp_tooltip: |
      Blender Launcher起動時にダウンロード用一時フォルダを自動的に空にします。
      デフォルト: 有効

    purge_temp_now: 今すぐ一時フォルダを空にする
    purge_temp_now_tooltip: |
        一時ダウンロードフォルダを即座に空にします

  logging:
    label: ログ
    log_level: ログレベル
    log_level_tooltip: |
      blender-launcher.log に書き出すメッセージの詳細度を設定します。
      レベルが低いほど詳細な情報が記録されます（DEBUGが最も詳細）。
      反映するには再起動が必要です。
      デフォルト: INFO
    open_log_folder: ログフォルダを開く
    open_log_folder_tooltip: |
      blender-launcher.log のあるフォルダをファイルマネージャで開きます。



appearance:
  label: 外観
  window_related: ウィンドウ関連
  use_system_titlebar: システムタイトルバーを使用
  use_system_titlebar_tooltip: |
    カスタムタイトルバーの代わりにシステムタイトルバーを使用します
    デフォルト: 無効
  dpi_scale_factor: DPIスケール倍率
  dpi_scale_factor_overridden: DPIスケール倍率 (QT_SCALE_FACTOR環境変数で上書きされています！)
  dpi_scale_factor_tooltip: |
    アプリケーションのDPIスケーリングを変更します
    UIをスケーリングして読みやすく快適にします
    デフォルト: 1.0
  notifications:
    label: 通知
    new_builds: 新しいビルドの通知
    new_builds_tooltip: |
      新しいビルドが利用可能な場合に通知を表示します
      デフォルト: 有効
    finished_downloading: ダウンロード完了
    finished_downloading_tooltip: |
      ダウンロードが完了した際に通知を表示します
      デフォルト: 有効
    errors: エラー
    errors_tooltip: |
      エラーが発生した際に通知を表示します
      デフォルト: 有効
  tabs:
    label: タブ
    default_tab: デフォルトタブ
    default_tab_tooltip: |
      アプリケーション起動時に開くデフォルトのタブ
      デフォルト: Library
    sync_library_and_downloads_pages: ライブラリとダウンロードページを同期
    sync_library_and_downloads_pages_tooltip: |
      選択中のライブラリタブと対応するダウンロードタブを同期します
      デフォルト: 有効
    default_library_page: デフォルトライブラリページ
    default_library_page_tooltip: |
      ライブラリタブで開くデフォルトのページ
      デフォルト: Stable Releases
    default_downloads_page: デフォルトダウンロードページ
    default_downloads_page_tooltip: |
      ダウンロードタブで開くデフォルトのページ
      デフォルト: Stable Releases

connection:
  label: 接続
  proxy_settings: プロキシ
  use_custom_tls_certificates: カスタムTLS証明書を使用
  use_custom_tls_certificates_tooltip: |
    接続にカスタムTLS証明書を使用します
    デフォルト: 無効
  proxy_type_tooltip: |
    接続に使用するプロキシの種類
    デフォルト: None
  proxy_host_tooltip: |
    プロキシサーバーのIPアドレス
    デフォルト: 255.255.255.255
  proxy_port_tooltip: |
    プロキシサーバーのポート番号
    デフォルト: 9999
  proxy_user_tooltip: プロキシサーバーの認証ユーザー名
  proxy_password_tooltip: プロキシサーバーの認証パスワード
  authentication_settings: 接続認証
  user_id: ユーザーID
  user_id_tooltip: |
    Blenderウェブサイトの認証用ユーザーID
    デフォルト: Random UUID
    形式: 8-64文字 (a-z, A-Z, 0-9, -)
  github_token: GitHubトークン
  github_token_tooltip: |
    オプション: レート制限を回避するためのGitHubパーソナルアクセストークン
    GitHub APIに多数のリクエストを行う場合に便利です
    不要な場合は空のままにしてください
  github_token_info_button_tooltip: GitHubトークンのドキュメントを表示するにはクリック
  proxy_type: 種類
  proxy_ip: IP
  proxy_host: ホスト
  proxy_port: ポート
  proxy_user: プロキシユーザー
  proxy_password: パスワード

  keyring_unavailable_title: キーリングが利用できません
  keyring_unavailable_message: |
    GitHubトークンをシステムのセキュアキーリングに保存できませんでした。

    代わりに設定ファイルにトークンが保存されました。
    これはキーリングストレージより安全性が低くなります。

    システムにキーリングサポートのインストールを検討してください。

blender_builds:
  label: Blenderビルド
  visibility_and_downloading: 表示とダウンロード
  checking_for_builds: ビルドの確認

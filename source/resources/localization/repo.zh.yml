visibility_tooltip: |
  在启动器视图中显示/隐藏此仓库。
  如果禁用，则将自动禁用获取，
  除非其他仓库共享获取行为。

download_tooltip: |
  启用/禁用获取此仓库。
  如果在按下"检查"按钮时按住SHIFT键强制检查，
  则无论获取设置如何，所有可见类别都将下载。

no_builds: 未找到此类型的构建版本！

upload_time: 上传时间
commit_time: 提交时间

no_new_builds: 没有可用的新构建版本
